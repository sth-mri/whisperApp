<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous & Encrypted Messenger</title>
    <!-- Load CryptoJS (for large text) and JSEncrypt (for Public Key) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    
    <style>
        /* CSS styling for a modern, dark, anonymous look */
        :root {
            --primary-gradient: linear-gradient(135deg, #6b21a8, #4c1d95);
            --primary-hover: linear-gradient(135deg, #7e22ce, #581c87);
            --primary-glow: rgba(107, 33, 168, 0.5);
            --danger-gradient: linear-gradient(135deg, #991b1b, #7f1d1d);
            --danger-hover: linear-gradient(135deg, #b91c1c, #991b1b);
            --danger-glow: rgba(153, 27, 27, 0.5);
            --edit-gradient: linear-gradient(135deg, #b45309, #92400e);
            --edit-hover: linear-gradient(135deg, #d97706, #b45309);
            --card-bg: rgba(20, 20, 25, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.15);
            --input-focus: #9333ea;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(to bottom, rgba(15, 23, 42, 0.85), rgba(0, 0, 0, 0.95)), url('https://images.unsplash.com/photo-1526243741027-444d633d7365?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 30px 20px; box-sizing: border-box; color: var(--text-main); }
        .main-wrapper { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 25px; }
        .app-container { background-color: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 30px 25px; border-radius: 16px; border: 1px solid var(--card-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h2 { margin-top: 0; text-align: center; font-size: 1.6rem; letter-spacing: 0.5px; }
        h3 { margin-top: 0; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px; color: #e5e7eb;}
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: #d1d5db; letter-spacing: 0.3px; }
        
        input[type="text"], textarea { width: 100%; padding: 14px; background-color: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: white; font-size: 1rem; font-family: inherit; box-sizing: border-box; transition: all 0.3s ease; }
        .is-encrypted { font-family: monospace !important; color: #34d399 !important; font-size: 0.85rem !important;}
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.25); background-color: rgba(0, 0, 0, 0.6); }
        textarea { resize: vertical; min-height: 120px; max-height: 300px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.5px; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-send { background: var(--primary-gradient); color: white; border: 1px solid rgba(147, 51, 234, 0.4); box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-send:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(147, 51, 234, 0.6); }
        .btn-retract { background: var(--danger-gradient); color: white; border: 1px solid rgba(220, 38, 38, 0.4); box-shadow: 0 4px 15px var(--danger-glow); display: none;}
        .btn-retract:hover:not(:disabled) { background: var(--danger-hover); box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6); }
        .btn-update { background: var(--edit-gradient); color: white; border: 1px solid rgba(217, 119, 6, 0.4); box-shadow: 0 4px 15px rgba(180, 83, 9, 0.4); display: none;}
        .btn-update:hover:not(:disabled) { background: var(--edit-hover); box-shadow: 0 6px 20px rgba(217, 119, 6, 0.6); }
        .btn-cancel { background-color: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.2); }
        .btn-cancel:hover:not(:disabled) { background-color: rgba(255, 255, 255, 0.05); color: white; border-color: rgba(255,255,255,0.4); }

        .notification { display: none; text-align: center; margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; backdrop-filter: blur(5px); }
        .success { background-color: rgba(6, 78, 59, 0.7); border: 1px solid #047857; color: #34d399; display: block; }
        .error { background-color: rgba(127, 29, 29, 0.7); border: 1px solid #b91c1c; color: #f87171; display: block; }

        .history-container { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .history-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); cursor: pointer; transition: background-color 0.2s, transform 0.1s; border-radius: 6px; }
        .history-item:hover { background-color: rgba(255, 255, 255, 0.08); transform: translateX(3px); }
        .history-item:last-child { border-bottom: none; }
        .history-item-date { color: #9ca3af; font-family: monospace; font-size: 0.8rem; margin-right: 12px; flex-shrink: 0; }
        .history-item-title { color: #e5e7eb; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        .no-history { text-align: center; color: var(--text-muted); font-size: 0.9rem; font-style: italic; padding: 10px 0; }
		
		/* Increased max-height for novel-writers */
textarea { 
    resize: vertical; 
    min-height: 120px; 
    max-height: 500px; /* Increased from 300px */
    overflow-y: auto; 
}

/* Character counter styling */
.char-counter {
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: monospace;
    transition: color 0.3s ease;
}

.char-counter.warning {
    color: #d97706; /* Warning orange */
}

.char-counter.danger {
    color: #f87171; /* Danger red */
}
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="app-container">
            <h2 id="formHeader">Whisper...</h2>
            <p class="subtitle" id="formSubtitle">Anonymous message app</p>

            <form id="messageForm">
                <div class="form-group">
                    <label for="title">Subject</label>
                    <input type="text" id="title" placeholder="Enter a brief subject..." required>
                </div>
                <div class="form-group">
					<label for="message">Message</label>
					<textarea id="message" placeholder="Say something nice here..." maxlength="35000" required></textarea>
					<div id="charCounter" class="char-counter">0 / 35000</div>
				</div>
                <div class="button-group">
                    <button type="submit" class="btn-send" id="sendBtn">Securely Send</button>
                    <button type="button" class="btn-retract" id="retractBtn">Retract Message</button>
                    <button type="submit" class="btn-update" id="updateBtn">Encrypt & Update</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Clear</button>
                </div>
            </form>
            <div id="notification" class="notification"></div>
        </div>

        <div class="app-container" id="historySection">
            <h3>Transmission Logs</h3>
            <div class="history-container" id="historyList"></div>
        </div>
    </div>

    <script>
        // --- 1. SET YOUR GOOGLE SCRIPT URL HERE ---
        const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5BzDvwfjvMoc6jk9GDxmqpmZM2_JE2Ih31fpVCC62wYb2mgZgI_5kwKlof9YH5hYr/exec';
        
        // --- 2. PASTE YOUR PUBLIC KEY HERE ---
        const PUBLIC_KEY = `-----BEGIN PUBLIC KEY-----
MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQChVC1++N5P76vvDmOvQbQHnUcQ
LVbMxqxWkZ0Rcjml4cnRoGt3wB5vOtFZsRfWMJeefBCrK+nnD5t0zDNtgWzcoSxd
CI1cctQ6EKlI888eG6l1tRo/Ajr07k5Dv1sC7i7P5i4Z4gINBsDZ7pniOxNIeiGp
odZ0n0tDfcF9kPCZewIDAQAB
-----END PUBLIC KEY-----`;

        const form = document.getElementById('messageForm');
        const titleInput = document.getElementById('title');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('sendBtn');
        const retractBtn = document.getElementById('retractBtn');
        const updateBtn = document.getElementById('updateBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const notification = document.getElementById('notification');
        const historyList = document.getElementById('historyList');

// --- Character Limit Logic ---
const MAX_CHARS = 35000;
const charCounter = document.getElementById('charCounter');

messageInput.addEventListener('input', function() {
    const currentLength = this.value.length;
    charCounter.innerText = `${currentLength} / ${MAX_CHARS}`;
    
    // Add visual warnings as they approach the limit
    if (currentLength >= MAX_CHARS) {
        charCounter.className = 'char-counter danger';
    } else if (currentLength >= MAX_CHARS * 0.9) { // Warn at 90% capacity (31,500 chars)
        charCounter.className = 'char-counter warning';
    } else {
        charCounter.className = 'char-counter';
    }
});

        let messageHistory = JSON.parse(localStorage.getItem('anonMessageHistory')) || [];
        let editingId = null; 

        function generateId() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15); }
        function setButtonsDisabled(state) { sendBtn.disabled = state; retractBtn.disabled = state; updateBtn.disabled = state; cancelBtn.disabled = state; }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const rawTitle = titleInput.value;
            const rawMessage = messageInput.value;
            const action = editingId ? 'edit' : 'create';
            const activeBtn = action === 'edit' ? updateBtn : sendBtn;
            
            activeBtn.innerText = 'Applying Public Key...';
            setButtonsDisabled(true);
            notification.className = 'notification';

            // --- HYBRID ENCRYPTION START ---
            
            // 1. Generate a temporary, random AES passcode for this specific message
            const tempPasscode = crypto.randomUUID().replace(/-/g, '') + Date.now().toString();

            // 2. Encrypt the large text using the temporary passcode
            const encryptedTitle = CryptoJS.AES.encrypt(rawTitle, tempPasscode).toString();
            const encryptedMessage = CryptoJS.AES.encrypt(rawMessage, tempPasscode).toString();

            // 3. Encrypt the temporary passcode using the RSA Public Key
            const rsa = new JSEncrypt();
            rsa.setPublicKey(PUBLIC_KEY);
            const encryptedPasscode = rsa.encrypt(tempPasscode);

            // --- HYBRID ENCRYPTION END ---

            // Visual UI Effect
            titleInput.value = encryptedTitle;
            messageInput.value = encryptedMessage;
            titleInput.classList.add('is-encrypted');
            messageInput.classList.add('is-encrypted');

            const messageId = editingId ? editingId : generateId();
            const timestamp = new Date().toISOString();

            // Send encrypted data to Google
            const payload = {
                action: action,
                id: messageId,
                title: encryptedTitle,
                message: encryptedMessage,
                passcode: encryptedPasscode
            };

            setTimeout(() => {
                activeBtn.innerText = 'Transmitting...';
                
                fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    if (action === 'create') {
                        messageHistory.unshift({ id: messageId, title: rawTitle, message: rawMessage, timestamp });
                        showNotification('Data securely encrypted and sent!', 'success');
                    } else if (action === 'edit') {
                        const index = messageHistory.findIndex(m => m.id === editingId);
                        if (index > -1) {
                            messageHistory[index].title = rawTitle;
                            messageHistory[index].message = rawMessage;
                            messageHistory[index].timestamp = timestamp;
                        }
                        showNotification('Record updated securely!', 'success');
                    }
                    saveAndRender(); resetFormState();
                }).catch(() => {
                    showNotification('Network error. Failed to transmit.', 'error');
                    resetFormState();
                });
            }, 800);
        });

        function selectMessage(id) {
            const msg = messageHistory.find(m => m.id === id);
            if (!msg) return;
            titleInput.value = msg.title; messageInput.value = msg.message; editingId = id;
            document.getElementById('formHeader').innerText = "Modify Log";
            document.getElementById('formSubtitle').innerText = "Update or obliterate this transmission.";
            sendBtn.style.display = 'none'; retractBtn.style.display = 'block'; updateBtn.style.display = 'block'; cancelBtn.innerText = 'Cancel';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        retractBtn.addEventListener('click', function() {
            if (!editingId) return;
            if (!confirm("Are you sure you want to permanently retract and obliterate this message?")) return;

            const idToRetract = editingId;
            setButtonsDisabled(true); retractBtn.innerText = 'Purging...';

            const payload = { action: 'delete', id: idToRetract, title: '', message: '', passcode: '' };

            messageHistory = messageHistory.filter(m => m.id !== idToRetract);
            saveAndRender();
            
            fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                showNotification('Record purged from server.', 'success'); resetFormState();
            }).catch(() => { showNotification('Failed to connect to server.', 'error'); });
        });

        cancelBtn.addEventListener('click', resetFormState);

        function renderHistory() {
            historyList.innerHTML = '';
            if (messageHistory.length === 0) { historyList.innerHTML = '<div class="no-history">No local transmission logs found.</div>'; return; }
            messageHistory.forEach(msg => {
                const dateObj = new Date(msg.timestamp);
                const dateStr = dateObj.toLocaleDateString('en-GB', {day: '2-digit', month: '2-digit', year: '2-digit'}) + ' ' + dateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                const item = document.createElement('div');
                item.className = 'history-item'; item.onclick = () => selectMessage(msg.id);
                item.innerHTML = `<span class="history-item-date">${dateStr}</span><span class="history-item-title">${escapeHTML(msg.title)}</span>`;
                historyList.appendChild(item);
            });
        }

        function saveAndRender() { localStorage.setItem('anonMessageHistory', JSON.stringify(messageHistory)); renderHistory(); }

        function resetFormState() {
            form.reset(); editingId = null;
            titleInput.classList.remove('is-encrypted'); messageInput.classList.remove('is-encrypted');
            document.getElementById('formHeader').innerText = "Whisper..."; //document.getElementById('formSubtitle').innerText = "Securely transmit your message.";
            sendBtn.style.display = 'block'; retractBtn.style.display = 'none'; updateBtn.style.display = 'none'; cancelBtn.innerText = "Clear";
            sendBtn.innerText = "Send Securely"; updateBtn.innerText = "Update";
            setButtonsDisabled(false);
        }

        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])); }
        function showNotification(msg, type) { notification.innerText = msg; notification.className = `notification ${type}`; setTimeout(() => { notification.style.display = 'none'; notification.className = 'notification'; }, 4000); }

        renderHistory();
    </script>
</body>
</html>
